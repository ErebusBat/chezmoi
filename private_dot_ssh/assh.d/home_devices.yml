############################################################
# Templates
############################################################
templates:
  personal-gateways:
    GatewayConnectTimeout: 2
    # Gateways:
    #   - direct
    #   - dartp6-nplh
    #   - mbp-nplh
  bat-devices:
    Inherits: personal-gateways
    IdentityFile: ~/.ssh/id_bat_devices
    ForwardAgent: yes
    IdentitiesOnly: yes
    AddKeysToAgent: yes
  bat-devices-admin:
    User: admin
    Inherits: bat-devices
  personal:
    Inherits: personal-gateways
    User: aburns
    ForwardAgent: yes
    IdentitiesOnly: yes
    IdentityFile: ~/.ssh/id_ed25519
    AddKeysToAgent: yes
    GatewayConnectTimeout: 2
  personal-allowpass:
    Inherits: personal-gateways
    User: aburns
    ForwardAgent: yes
    IdentityFile: ~/.ssh/id_ed25519
    AddKeysToAgent: yes
    GatewayConnectTimeout: 2
  personal-server:
    Inherits: personal-allowpass
    #RemoteForward: /run/user/1000/gnupg/S.gpg-agent /Users/aburns/.gnupg/S.gpg-agent.extra
  raspi:
    User: pi
    Inherits: bat-devices


