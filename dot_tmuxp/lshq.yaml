session_name: lshq
start_directory: ~/src/lshq
windows:

- window_name: src
  panes:
    - z lshq
    - z lshq

- window_name: docs
  panes:
    - cd docs
    - cd docs

- window_name: wde-pi
  panes:
    - shell_command:
      - cd add-upenv
      - nvm use
      - pi -c
    - shell_command:
      - cd add-upenv
      - nvm use

