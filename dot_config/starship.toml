"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$username\
$directory\
${custom.repo_name}\
$git_status\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$ruby\
$docker_context\
$kubernetes\
$aws\
$pulumi\
$conda\
$time\
$line_break\
$container\
$hostname\
$sudo\
$cmd_duration\
${env_var.LAZYGIT_SHELL}\
${env_var.CLAUDE_CODE_PANE}\
$status\
$character"""
right_format = """\
$battery\
${custom.lan_ip}\
${env_var.TMUX_PANE}\
"""

palette = 'catppuccin_mocha'

[env_var.LAZYGIT_SHELL]
disabled = false
symbol = "󰊢"
style = "red"
format = "[$symbol]($style) "

[env_var.CLAUDE_CODE_PANE]
variable = "CLAUDE_CODE_PANE"
format = "🤖[$env_value]($style) "
style = "bold purple"
disabled = false

[env_var.TMUX_PANE]
variable = "TMUX_PANE"
format = "[$env_value]($style) "
style = "fg:grey"
disabled = false

[mise]
disabled = false
unhealthy_symbol = '❤️‍🩹'
healthy_symbol = '❤️'

[custom.lan_ip]
command = '$HOME/bin/.starship-lan-ip.sh'
when = 'test -x "$HOME/bin/.starship-lan-ip.sh"'
format = '[$output ]($style)'
style = "fg:text"

[status]
disabled = false

[battery]
disabled = false

[[battery.display]]  # "bold red" style when capacity is between 0% and 10%
threshold = 10
style = "bold red"
[[battery.display]]  # "bold yellow" style when capacity is between 10% and 30%
threshold = 30
style = "bold yellow"
[[battery.display]]
threshold = 95
style = "bold green"

[os]
disabled = false
style = "fg:red"

[os.symbols]
Bluefin = "󰌽"
Windows = ""
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"

[username]
show_always = true
style_user = "fg:red"
style_root = "fg:red"
format = '[ $user]($style)'
aliases = {
  "andrew.burns" = "a.b"
}

[directory]
style = "fg:peach"
format = "[ $path ]($style)"
truncate_to_repo = true
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "fg:text"
format = '[[ $symbol $branch ](fg:yellow)]($style)'

[custom.repo_name]
when = 'git rev-parse --git-dir >/dev/null 2>&1'
command = '$HOME/bin/.starship-git-location.sh'
style = "fg:text"
# format = '[[ $output ](fg:yellow)]($style)'

[git_status]
style = "fg:text"
format = '[[($all_status$ahead_behind )](fg:yellow)]($style)'

[nodejs]
symbol = ""
style = "fg:text"
format = '[[ $symbol( $version) ](fg:green)]($style)'

[c]
symbol = " "
style = "fg:text"
format = '[[ $symbol( $version) ](fg:green)]($style)'

[rust]
symbol = ""
style = "fg:text"
format = '[[ $symbol( $version) ](fg:green)]($style)'

[golang]
symbol = ""
style = "fg:text"
format = '[[ $symbol( $version) ](fg:green)]($style)'

[php]
symbol = ""
style = "fg:text"
format = '[[ $symbol( $version) ](fg:green)]($style)'

[java]
symbol = " "
style = "fg:text"
format = '[[ $symbol( $version) ](fg:green)]($style)'

[kotlin]
symbol = ""
style = "fg:text"
format = '[[ $symbol( $version) ](fg:green)]($style)'

[haskell]
symbol = ""
style = "fg:text"
format = '[[ $symbol( $version) ](fg:green)]($style)'

[python]
symbol = ""
style = "fg:text"
format = '[[ $symbol( $version )(\(#$virtualenv\))](fg:green)]($style)'

[ruby]
symbol = ""
style = "fg:text"
format = '[[ $symbol( $version ) ](fg:green)]($style)'

[docker_context]
symbol = ""
style = "fg:text"
format = '[[ $symbol( $context) ](fg:sapphire)]($style)'

[conda]
symbol = "  "
style = "fg:crust"
format = '[$symbol$environment ]($style)'
ignore_base = false

[time]
disabled = false
time_format = "%R"
style = "fg:text"
format = '[[  $time ](fg:lavender)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[❯](bold fg:green)'
error_symbol = '[❯](bold fg:red)'
vimcmd_symbol = '[❮](bold fg:peach)'
vimcmd_replace_one_symbol = '[❮](bold fg:lavender)'
vimcmd_replace_symbol = '[❮](bold fg:lavender)'
vimcmd_visual_symbol = '[❮](bold fg:yellow)'
format = " [$symbol]($style) "

[cmd_duration]
show_milliseconds = false
format = " ⏱︎ $duration"
style = "fg:text"
disabled = false
show_notifications = true
min_time = 9_500
min_time_to_notify = 60_000

