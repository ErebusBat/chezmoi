"$schema" = 'https://starship.rs/config-schema.json'

format = """
$time\
$os\
${custom.username}\
$directory\
${custom.repo_name}\
$git_status\
$battery\
${custom.lan_ip}\
${custom.context_line_break}\
$ruby\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$docker_context\
$kubernetes\
$aws\
$pulumi\
$conda\
$line_break\
$container\
${env_var.TMUX_PANE}\
$hostname\
$sudo\
$cmd_duration\
${env_var.OCP_PROFILE}\
${env_var.LAZYGIT_SHELL}\
${env_var.CLAUDE_CODE_PANE}\
$status\
$character"""
right_format = ""

palette = 'catppuccin_mocha'

[env_var.LAZYGIT_SHELL]
disabled = false
symbol = "ůįäĘ"
style = "red"
format = "[$symbol]($style) "

[env_var.CLAUDE_CODE_PANE]
variable = "CLAUDE_CODE_PANE"
format = "ūü§Ė[$env_value]($style) "
style = "bold purple"
disabled = false

[env_var.TMUX_PANE]
variable = "TMUX_PANE"
format = "[$env_value]($style)"
style = "fg:surface1"
disabled = false

[mise]
disabled = false
unhealthy_symbol = '‚Ě§ÔłŹ‚Äćūü©Ļ'
healthy_symbol = '‚Ě§ÔłŹ'

[custom.lan_ip]
command = '$HOME/bin/.starship-lan-ip.sh'
when = 'test -x "$HOME/bin/.starship-lan-ip.sh" && test -n "$($HOME/bin/.starship-lan-ip.sh)"'
format = '[$output ]($style)'
style = "fg:246"

[custom.context_line_break]
when = '''
for module in ruby c rust golang nodejs php java kotlin haskell python docker_context kubernetes aws pulumi conda; do
  if [ -n "$(starship module "$module" 2>/dev/null)" ]; then
    exit 0
  fi
done
exit 1
'''
command = 'printf x'
format = "\n"

[battery]
disabled = false

[[battery.display]]  # "bold red" style when capacity is between 0% and 10%
threshold = 10
style = "bold red"
[[battery.display]]  # "bold yellow" style when capacity is between 10% and 30%
threshold = 30
style = "bold yellow"
[[battery.display]]
threshold = 78
style = "bold green"

[os]
disabled = true
style = "fg:red"

# [os.symbols]
# Bluefin = "ůįĆĹ"
# Windows = "ÓúŹ"
# Ubuntu = "ůįēą"
# SUSE = "ÔĆĒ"
# Raspbian = "ůįźŅ"
# Mint = "ůį£≠"
# Macos = "ůįÄĶ"
# Manjaro = "ÔĆí"
# Linux = "ůįĆĹ"
# Gentoo = "ůį£®"
# Fedora = "ůį£õ"
# Alpine = "ÔĆÄ"
# Amazon = "ÔČį"
# Android = "Óúé"
# Arch = "ůį£á"
# Artix = "ůį£á"
# CentOS = "ÔĆĄ"
# Debian = "ůį£ö"
# Redhat = "ůĪĄõ"
# RedHatEnterprise = "ůĪĄõ"

[hostname]
ssh_only = true
ssh_symbol = "‚Ěģ=‚ĚĮ "
style = "fg:surface1"
format = "[$ssh_symbol$hostname]($style)"
aliases = {
  "USMB-JVK937H909" = "LSMBP",
  "dartp6" = "sys76",
  "outpost" = "[|ūüŹį|]",
}

[sudo]
disabled = false
symbol = "ūüö®"
# style = "fg:crust"
format = " [$symbol]($style)"

[username]
disabled = true
show_always = false
style_user = "fg:surface1"
style_root = "fg:red"
format = '[$user]($style)'
aliases = {
  "andrew.burns" = "a.b"
}

[custom.username]
command = 'case "${USER:-$(id -un)}" in andrew.burns|aburns) exit 1 ;; *) printf "%s" "${USER:-$(id -un)}" ;; esac'
when = 'case "${USER:-$(id -un)}" in andrew.burns|aburns) exit 1 ;; *) exit 0 ;; esac'
style = "fg:surface1"
format = '[$output]($style)'

[time]
disabled = false
time_format = "%R"
style = "fg:177"
format = '[Ôźļ $time]($style)'

[directory]
style = "fg:215"
format = "[ $path ]($style)"
truncate_to_repo = false
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents/Obsidian" = "ūüĒģ"
"Documents/AI/wiki" = "ūüéď"
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ůįĚö "
"Pictures" = "ÔÄĺ "
"Developer" = "ůį≤č "

[git_branch]
symbol = "Ôźė"
style = "fg:text"
format = '[[ $symbol $branch ](fg:yellow)]($style)'

[custom.repo_name]
when = 'git rev-parse --git-dir >/dev/null 2>&1'
command = '$HOME/bin/.starship-git-location.sh'
style = "fg:208"
format = '[$output ]($style)'

[git_status]
style = "fg:text"
format = '([$all_status$ahead_behind ](fg:yellow))'
use_git_executable = true

[status]
disabled = false
format = "[$symbol $status]($style)"

[nodejs]
symbol = "Óúė"
style = "fg:text"
format = '[[$symbol( $version) ](fg:green)]($style)'

[c]
symbol = "Óėě"
style = "fg:text"
format = '[[$symbol( $version) ](fg:green)]($style)'

[rust]
symbol = "Óě®"
style = "fg:text"
format = '[[$symbol( $version) ](fg:green)]($style)'

[golang]
symbol = "Óėß"
style = "fg:text"
format = '[[$symbol( $version) ](fg:blue)]($style)'

[php]
symbol = "Óėą"
style = "fg:text"
format = '[[$symbol( $version) ](fg:green)]($style)'

[java]
symbol = "ÓČĖ"
style = "fg:text"
format = '[[$symbol( $version) ](fg:green)]($style)'

[kotlin]
symbol = "Óėī"
style = "fg:text"
format = '[[$symbol( $version) ](fg:green)]($style)'

[haskell]
symbol = "Óėü"
style = "fg:text"
format = '[[$symbol( $version) ](fg:green)]($style)'

[python]
symbol = "ÓėÜ"
style = "fg:text"
format = '[[$symbol( $version)(\(#$virtualenv\)) ](fg:yellow)]($style)'

[ruby]
symbol = "ÓěĎ"
style = "fg:text"
format = '[[$symbol( $version) ](fg:red)]($style)'

[docker_context]
symbol = "ÔĆą"
style = "fg:text"
format = '[[$symbol( $context) ](fg:sapphire)]($style)'

[conda]
symbol = "ÔĄĆ"
style = "fg:crust"
format = '[($symbol $environment )]($style)'
ignore_base = false

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[‚ĚĮ](bold fg:22)'
error_symbol = '[‚ĚĮ](bold fg:red)'
vimcmd_symbol = '[‚Ěģ](bold fg:88)'
vimcmd_replace_one_symbol = '[‚Ěģ](bold fg:lavender)'
vimcmd_replace_symbol = '[‚Ěģ](bold fg:lavender)'
vimcmd_visual_symbol = '[‚Ěģ](bold fg:yellow)'
format = " [$symbol]($style) "

[cmd_duration]
show_milliseconds = false
format = "‚ŹĪÔłé$duration "
style = "fg:text"
disabled = false
show_notifications = true
min_time = 9_500
min_time_to_notify = 60_000

