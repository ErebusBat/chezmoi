# Custom config from here on
[container]
# style = "fg:crust"
format = "[$symbol $name]($style)"

[hostname]
ssh_only = false
ssh_symbol = "❮=❯ "
style = "fg:surface1"
format = "[$ssh_symbol$hostname]($style)"
aliases = {
  "USMB-JVK937H909" = "LSMBP"
}

[sudo]
disabled = false
symbol = "🚨"
# style = "fg:crust"
format = "[$symbol]($style)"

[gcloud]
disabled = true

[aws]
style = "fg:surface1"
format = '[ ($profile )(\($region\) )(\[$duration\] )]($style)'

[aws.region_aliases]
us-east-1 = 'us-e1'
[aws.profile_aliases]
"lsu/swipely/poweruser/us-east-1" = "swipely/poweruser"

[kubernetes]
symbol = '☸'
format = '[[ $symbol( $context \($namespace\)) ](fg:sapphire)]($style)'
disabled = false

[pulumi]
format = '[[ $symbol( $stack ) ](fg:sapphire)]($style)'
