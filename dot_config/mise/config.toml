# Global mise defaults. mise also loads config.local.toml when present; keep
# machine/OS-specific overrides there so this file remains plain TOML.
[settings]
experimental = true
idiomatic_version_file_enable_tools = ["ruby"]
env_shell_expand = true

[tools]
"cargo:ErebusBat/grcpass-rs" = "latest"
"github:Liam-Deacon/codex-usage" = "latest"
"github:aristocratos/btop" = { version = "latest", os = ["linux"] }
"github:bahdotsh/mdterm" = "latest"
"github:grafana/grafana-kiosK" = { version = "latest", os = ["linux"] }
"github:mrkatebzadeh/darya" = "latest"
"github:sst/opencode" = { version = "latest", os = ["linux"] }
assh = "latest"
bat = "latest"
chezmoi = "latest"
codex = "latest"
delta = "latest"
difftastic = "latest"
duf = "latest"
dust = "latest"
eza = "latest"
fastfetch = "latest"
fd = "latest"
fzf = "latest"
glow = { version = "latest", os = ["linux"] } # only on Linux because we use our custom version on macOS
jq = "latest"
jqp = "latest"
just = "latest"
lazydocker = "latest"
lazygit = "latest"
node = { version = "latest", os = ["linux"] }
npm = { version = "latest", os = ["linux"] }
restic = "latest"
ripgrep = "latest"
ripgrep-all = "latest"
ruby = "4.0.3"
rust = "latest"
starship = "latest"
yazi = "latest"
zoxide = "latest"
