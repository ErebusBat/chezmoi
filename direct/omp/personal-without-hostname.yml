providers: 
  webSearch: brave
  memoryModel: online
  maxInFlightRequests: 
    lm-studio: 1
  streamFirstEventTimeoutSeconds: 3600
  streamIdleTimeoutSeconds: 3600
symbolPreset: nerd
theme: 
  dark: dark-ember
  light: light-gruvbox
setupVersion: 1
terminal: 
  showProgress: true
display: 
  showTokenUsage: true
  cacheMissMarker: true
steeringMode: all
interruptMode: immediate
doubleEscapeAction: tree
memory: 
  backend: mnemopi
eval: 
  rb: true
vault: 
  enabled: true
github: 
  enabled: true
plan: 
  defaultOnStartup: false
exa: 
  enableWebsets: false
statusLine: 
  preset: custom
  leftSegments: 
    - pi
    - mode
    - model
    - path
    - git
    - pr
    - subagents
    - time_spent
  rightSegments: 
    - session_name
    - context_pct
    - cost
    - usage
    - session
    - time
    - collab
dev: 
  autoqaConsent: granted
defaultThinkingLevel: medium
modelRoles: 
  default: openai-codex/gpt-5.6-terra:medium
  task: openai-codex/gpt-5.6-terra:auto
  smol: openrouter/openai/gpt-5.6-terra:low
  tiny: deepseek/deepseek-v4-flash
  commit: openai-codex/gpt-5.6-luna:low
  cheap: zai/glm-5.2:high
  slow: openai-codex/gpt-5.6-sol:high
  plan: openai-codex/gpt-5.6-terra:high
  designer: openai-codex/gpt-5.6-sol:medium
  advisor: kimi-code/k3:high
  vision: openai-codex/gpt-5.6-terra
  flash: deepseek/deepseek-v4-flash:high
task: 
  agentModelOverrides: 
    plan: gpt-5.6-sol
    sonic: gpt-5.6-luna
retry: 
  fallbackChains: 
    default: 
      - openai-codex/gpt-5.3-codex-spark
      - kimi-code/k3
    smol: 
      - deepseek/deepseek-v4-flash
    commit: 
      - deepseek/deepseek-v4-flash
    cheap: 
      - deepseek/deepseek-v4-pro
      - kimi-code/k3
    slow: 
      - openai-codex/gpt-5.3-codex-spark
    advisor: 
      - zai/glm-5.2
hideThinkingBlock: false
cycleOrder: 
  - cheap
  - smol
  - default
  - plan
  - advisor
mcp: 
  {}
autolearn: 
  enabled: true
mnemopi: 
  scoping: per-project-tagged
  embeddingVariant: en
  noEmbeddings: false
  llmMode: smol
magicKeywords: 
  ultrathink: false
startup: 
  showSplash: false
collapseChangelog: true
power: 
  sleepPrevention: idle