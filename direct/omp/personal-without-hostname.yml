providers:
  webSearch: brave
  memoryModel: online
  maxInFlightRequests:
    lm-studio: 1
  streamFirstEventTimeoutSeconds: 3600
  streamIdleTimeoutSeconds: 3600
symbolPreset: nerd
theme:
  dark: dark-ember
  light: light-gruvbox
setupVersion: 1
terminal:
  showProgress: true
display:
  showTokenUsage: true
  cacheMissMarker: true
steeringMode: all
interruptMode: immediate
doubleEscapeAction: tree
memory:
  backend: mnemopi
eval:
  rb: true
vault:
  enabled: true
github:
  enabled: true
plan:
  defaultOnStartup: false
exa:
  enableWebsets: false
statusLine:
  preset: custom
  leftSegments:
    - pi
    - mode
    - model
    - path
    - git
    - pr
    - subagents
    - time_spent
  rightSegments:
    - session_name
    - context_pct
    - cost
    - usage
    - session
    - time
    - collab
dev:
  autoqaConsent: granted
defaultThinkingLevel: medium
cycleOrder:
  - budget
  - smol
  - default
  - spark
  - plan
  - plan_budget
  - flash
  - deepseek
  - kimi
modelRoles:
  # Internal Models
  tiny: deepseek/deepseek-v4-flash
  commit: deepseek/deepseek-v4-flash
  vision: openai-codex/gpt-5.6-terra
  advisor: kimi-code/k3:high

  # OpenAI
  default: openai-codex/gpt-5.6-terra:medium
  task: openai-codex/gpt-5.6-terra:auto
  smol: openrouter/openai/gpt-5.6-terra:low
  slow: openai-codex/gpt-5.6-sol:high
  plan: openai-codex/gpt-5.6-terra:medium
  spark: openai-codex/gpt-5.3-codex-spark

  # Budget
  budget: zai/glm-5.2:high
  plan_budget: deepseek/deepseek-v4-pro:high
  designer: openai-codex/gpt-5.6-sol:medium
  kimi: kimi-code/k3:high
  flash: deepseek/deepseek-v4-flash:high
  deepseek: deepseek/deepseek-v4-pro:high
task:
  agentModelOverrides:
    plan: gpt-5.6-sol
    sonic: gpt-5.6-luna
retry:
  fallbackChains:
    default:
      - zai/glm-5.2:high
      - openai-codex/gpt-5.3-codex-spark
      - kimi-code/k3
    smol:
      - deepseek/deepseek-v4-flash
    commit:
      - deepseek/deepseek-v4-flash
    budget:
      - kimi-code/k3
      - deepseek/deepseek-v4-pro
    slow:
      - openai-codex/gpt-5.3-codex-spark
    advisor:
      - zai/glm-5.2
hideThinkingBlock: false
mcp:
  {}
autolearn:
  enabled: true
mnemopi:
  scoping: per-project-tagged
  embeddingVariant: en
  noEmbeddings: false
  llmMode: smol
magicKeywords:
  ultrathink: false
startup:
  showSplash: false
collapseChangelog: true
power:
  sleepPrevention: idle
